name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Hard gate: the vm-based test harnesses use only Node built-ins (zero deps), so this
  # job needs no install and runs in seconds. A red here blocks the merge.
  test:
    name: Unit / logic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run all test suites
        run: node test/run-all.js

  # Informational: formatting + lint. Non-blocking while the legacy codebase is brought
  # up to standard incrementally — surfaces issues without failing the build.
  quality:
    name: Format + lint (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dev tooling
        run: npm install --no-audit --no-fund
      - name: Prettier check
        run: npm run format:check || true
      - name: ESLint
        run: npm run lint || true
