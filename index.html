<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhoaiBonlingo - Học tiếng Anh vui mỗi ngày</title>
    <!-- App icon + PWA: makes "Thêm vào màn hình chính" install with the mascot icon
         and open full-screen like a native app (see manifest.webmanifest). -->
    <meta name="theme-color" content="#58cc02">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KhoaiBonlingo">
    <link rel="stylesheet" href="assets/css/style.css?v=20260729">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Boot splash: shows INSTANTLY while the (large) course data + app JS download and
         parse, instead of a frozen page. app.js removes it once the app object is live.
         Self-contained styles (not in style.css) so it never waits on anything, and a
         20s CSS auto-hide acts as a fail-safe if a script ever fails to load. -->
    <style>
        #boot-splash {
            position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px; background: #fff;
            font-family: 'Nunito', sans-serif; transition: opacity .4s ease;
            animation: bootSplashAutoHide .5s ease 20s forwards;
        }
        #boot-splash.done { opacity: 0; pointer-events: none; }
        .boot-splash-mascot { font-size: 64px; animation: bootBounce 1s ease-in-out infinite; }
        .boot-splash-title { font-size: 24px; font-weight: 800; color: #58cc02; }
        .boot-splash-bar { width: 190px; height: 10px; border-radius: 999px; background: #e5e5e5; overflow: hidden; }
        .boot-splash-bar::after {
            content: ''; display: block; height: 100%; width: 40%; border-radius: 999px;
            background: #58cc02; animation: bootSlide 1.1s ease-in-out infinite;
        }
        .boot-splash-tip { font-size: 13px; color: #999; font-weight: 700; }
        @keyframes bootBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes bootSlide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
        @keyframes bootSplashAutoHide { to { opacity: 0; visibility: hidden; pointer-events: none; } }
        @media (prefers-reduced-motion: reduce) { .boot-splash-mascot, .boot-splash-bar::after { animation: none; } }
    </style>
</head>
<body style="background-color: #fff;">
    <div id="boot-splash" aria-hidden="true">

        <div class="boot-splash-title">KhoaiBonlingo</div>
        <div class="boot-splash-bar"></div>
        <div class="boot-splash-tip">Đang chuẩn bị bài học...</div>
    </div>
    <div id="app">

                        <button id="ielts-btn" class="nav-more-item"><span>🎓</span> Luyện thi IELTS</button>

                        <button id="inbox-btn" class="nav-more-item"><span>📬</span> Hộp thư <span id="inbox-unread-badge" class="nav-unread-badge hidden">0</span></button>
                        <button id="groups-btn" class="nav-more-item"><span>🏰</span> Group</button>

            <div class="nav-center">

            <div class="nav-right">

            </div>
        </header>

        <main class="content">
            <div id="lesson-container">
                <!-- Auth Screen -->

                        <input type="password" id="password-input" placeholder="Mật khẩu..." class="input-field" style="padding: 15px; border: 2px solid #e5e5e5; border-radius: 12px; text-align: center;">

        </main>

        <footer class="bottom-nav">
            <button id="skip-btn" class="btn-skip" style="display: none;">BỎ QUA CÂU NÀY</button>
            <button id="check-btn" class="btn-secondary" disabled>KIỂM TRA</button>

    <div id="modal-overlay" class="hidden">

    <!-- CACHE-BUSTING: local assets carry a version query so browsers always fetch the
         latest after a change (no more stale games.js/app.js). Bump ?v= on any CSS/JS

         app is SERVED OVER HTTP (hosting or a local server) - they intentionally break a

    <script defer src="data/data.js?d=20260720d"></script>
